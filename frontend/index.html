<!DOCTYPE html>
<html>
<head>
    <title>Data Katalog</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1 {
            color: black;
        }

        p {
            font-size: 18px;
        }

        li {
            margin-bottom: 8px;
            font-size: 17px;
        }

        input {
            padding: 8px;
            width: 220px;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
        }

        .form-box {
            margin-top: 25px;
        }
    </style>
</head>

<body>

    <h1>Data Katalog</h1>

    <p id="pemilik"></p>
    <p id="nim"></p>

    <ul id="items"></ul>

    <div class="form-box">

        <h3>Tambah Item Baru</h3>

        <input type="text" id="newItem" placeholder="Masukkan item">
        <button onclick="tambahItem()">Tambah</button>

    </div>

<script>

fetch("/api/info")
  .then(res => res.json())
  .then(data => {

    document.getElementById("pemilik").innerText =
      "Nama: " + data.pemilik;

    document.getElementById("nim").innerText =
      "NIM: " + data.nim;

    tampilkanItems(data.items);
  })

  .catch(err => {
    console.error("ERROR:", err);
  });

function tampilkanItems(items) {

    let list = document.getElementById("items");
    list.innerHTML = "";

    items.forEach(item => {

        let li = document.createElement("li");
        li.innerText = item;

        list.appendChild(li);
    });
}

function tambahItem() {

    let input = document.getElementById("newItem");

    if(input.value.trim() !== "") {

        let li = document.createElement("li");

        li.innerText = input.value;

        document.getElementById("items").appendChild(li);

        input.value = "";
    }
}

</script>

</body>
</html>
